services:
  - type: web
    name: nmu-engineering-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRATION_HOURS
        value: "8"
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
